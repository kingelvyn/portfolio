name: Build, publish, and deploy
on:
  push:
    branches:
      - main
      - v1

permissions:
  contents: write
  packages: write

jobs:
  docker:
    if: ${{ !contains(github.event.head_commit.message, 'Deploy ') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: 
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set branch variables
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "IMAGE_TAG_STABLE=v2" >> $GITHUB_ENV
            echo "IMAGE_TAG_IMMUTABLE=v2-${SHORT_SHA}" >> $GITHUB_ENV
            echo "WEBHOOK_URL=${{ secrets.PORTFOLIOV2_WEBHOOK }}" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "v1" ]; then
            echo "IMAGE_TAG_STABLE=v1" >> $GITHUB_ENV
            echo "IMAGE_TAG_IMMUTABLE=v1-${SHORT_SHA}" >> $GITHUB_ENV
            echo "WEBHOOK_URL=${{ secrets.PORTFOLIOV2_WEBHOOK }}" >> $GITHUB_ENV
          else
            echo "Unsupported branch"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/kingelvyn/portfolio:${{ env.IMAGE_TAG_STABLE }}
            ghcr.io/kingelvyn/portfolio:${{ env.IMAGE_TAG_IMMUTABLE }}

      - name: Update docker-compose image tag
        run: |
          sed -i "s|image: ghcr.io/kingelvyn/portfolio:.*|image: ghcr.io/kingelvyn/portfolio:${IMAGE_TAG_IMMUTABLE}|g" docker-compose.yml
          cat docker-compose.yml

      - name: Commit updated compose file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git diff --cached --quiet || git commit -m "Deploy ${GITHUB_REF_NAME} -> ${IMAGE_TAG_IMMUTABLE}"
          git push

      - name: Trigger Portainer webhook
        run: |
          curl --fail --show-error --silent -X POST "${WEBHOOK_URL}"

      - name: Notify Discord
        if: ${{ success() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"Portfolio deploy triggered for ${GITHUB_REF_NAME} (${GITHUB_SHA::7}).\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on failure
        if: ${{ failure() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"Portfolio deploy failed for ${GITHUB_REF_NAME} (${GITHUB_SHA::7}).\"}" \
            "$DISCORD_WEBHOOK_URL"