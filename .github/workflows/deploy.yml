name: Deploy to Homelab

on:
  push:
    branches:
      - main
      - v1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set deployment target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "COMPOSE_FILE=docker-compose.v2.yml" >> $GITHUB_ENV
            echo "APP_PORT=3000" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "v1" ]; then
            echo "COMPOSE_FILE=docker-compose.v1.yml" >> $GITHUB_ENV
            echo "APP_PORT=3001" >> $GITHUB_ENV
          else
            echo "Unsupported branch"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/apps/portfolio
            docker compose -f ${{ env.COMPOSE_FILE }} pull
            docker compose -f ${{ env.COMPOSE_FILE }} up -d
            sleep 5
            curl -f http://localhost:${{ env.APP_PORT }}/healthz
            docker image prune -f