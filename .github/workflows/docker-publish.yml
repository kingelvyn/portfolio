name: Build and Publish Image

on:
  push:
    branches:
      - main
      - v1

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag from branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "IMAGE_TAG=v2" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "v1" ]; then
            echo "IMAGE_TAG=v1" >> $GITHUB_ENV
          else
            echo "Unsupported branch"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/kingelvyn/portfolio:${{ env.IMAGE_TAG }}
            ghcr.io/kingelvyn/portfolio:${{ env.IMAGE_TAG }}-${{ github.sha }}