<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}} // Elvyn</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/static/css/style-cyberpunk.css?V=1" />
  <link rel="stylesheet" href="/static/css/projects.css?v=1" />
  <link rel="stylesheet" href="/static/css/project-single.css?v=1" />
</head>
<body class="projects-page-body">
  <div class="background-grid"></div>
  <div class="background-glow"></div>
  <div class="scanlines"></div>
  <div class="background-vignette"></div>
  <div class="hud-rings"></div>
  <div class="diag-lines"></div>

  <div class="top-links">
    <a href="/">HOME</a>
    <a href="/static/resume-new.pdf" target="_blank" rel="noopener noreferrer">RESUME</a>
    <a href="https://github.com/kingelvyn" target="_blank" rel="noopener noreferrer">GITHUB</a>
    <a href="https://www.linkedin.com/in/the-elvyn/" target="_blank" rel="noopener noreferrer">LINKEDIN</a>
    <a href="mailto:ecacha1@lsu.edu">EMAIL</a>
  </div>

  <main class="project-detail-page">
    <div class="boot-sequence">
      <p class="boot-line" data-text="Accessing {{.Title}}..."></p>
    </div>
    <section class="project-detail-panel">
      <div
        class="detail-status-badge status-dot {{if eq .Status "active"}}status-dot-active{{else if eq .Status "wip"}}status-dot-wip{{end}}"
        aria-label="{{.Status}} status"
        title="{{.Status}}">
      </div>
    
      <div class="panel-tag">PROJECT RECORD</div>
    
      <div class="detail-header">
        <div class="detail-top-row">
        </div>
    
        <div class="project-detail-actions">
          <a class="detail-btn" href="/projects">← RETURN TO ARCHIVE</a>
        </div>
      </div>
    
      <article class="project-markdown">
        {{.HTMLContent}}
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Elvynprise</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="/static/js/project-single.js?v=3"></script>
</body>
</html>
